<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Nexum" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <title>Nexum - Planification intelligente de tournées</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #1c2a4a;
      --border: #2a3a5c;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --accent: #4f8cff;
      --accent2: #3b6fcf;
      --green: #22c55e;
      --green-bg: #16332a;
      --red: #ef4444;
      --red-bg: #331a1a;
      --yellow: #f59e0b;
      --yellow-bg: #33291a;
      --radius: 10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex;
      height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 400px; min-width: 340px;
      display: flex; flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      z-index: 10;
      overflow-y: auto; overflow-x: hidden;
    }
    .sidebar-header {
      background: linear-gradient(135deg, #0f3460, #1a5276);
      padding: 18px 20px 14px;
      flex-shrink: 0;
    }
    .sidebar-header h1 { font-size: 1.2rem; font-weight: 700; color: #fff; }
    .sidebar-header p { font-size: .75rem; color: rgba(255,255,255,.6); margin-top: 3px; }
    .sidebar-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; flex: 1; }

    /* ── SECTIONS ── */
    .section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }
    .section-title {
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: var(--text2); margin-bottom: 8px;
    }
    #app-sections { display: none; flex-direction: column; gap: 12px; }
    #app-sections.visible { display: flex; }

    /* ── API STATUS ── */
    .api-status-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .api-status-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .api-status-dot.off { background: var(--red); box-shadow: 0 0 6px var(--red); }

    /* ── INPUTS ── */
    .input-row { display: flex; gap: 8px; }
    input[type="text"] {
      flex: 1;
      background: var(--bg); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 9px 12px; font-size: .85rem; outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--text2); }

    /* ── BUTTONS ── */
    button {
      border: none; border-radius: 8px; cursor: pointer;
      font-size: .82rem; font-weight: 600; padding: 9px 14px;
      transition: opacity .15s, transform .1s; white-space: nowrap;
    }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button:not(:disabled):hover { opacity: .85; transform: translateY(-1px); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-success { background: var(--green); color: #fff; }
    .btn-warning { background: var(--yellow); color: #1a1a2e; }
    .btn-del {
      background: transparent; color: var(--red); border: 1px solid #5c2a2a;
      padding: 0; width: 24px; height: 24px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; flex-shrink: 0;
    }
    .btn-del:hover { background: var(--red-bg); }

    /* ── START DISPLAY ── */
    #start-display {
      margin-top: 8px; font-size: .75rem; color: var(--green);
      font-weight: 500; word-break: break-word; display: none;
      background: var(--green-bg); border: 1px solid #1a4a2a;
      border-radius: 6px; padding: 8px 10px; line-height: 1.4;
    }
    #start-display::before { content: '✓ '; font-weight: 700; }
    #start-display.visible { display: block; }

    /* ── DELIVERY LIST ── */
    #delivery-list {
      list-style: none; display: flex; flex-direction: column; gap: 6px;
      margin-bottom: 8px; max-height: 300px; overflow-y: auto; padding: 4px 2px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    #delivery-list li {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 12px;
      font-size: .8rem; color: var(--text);
      transition: opacity .2s, box-shadow .2s, border-color .2s, transform .2s, margin .2s;
    }
    #delivery-list li.drag-neighbor-above {
      border-color: rgba(100,180,255,.7);
      box-shadow: 0 0 10px rgba(80,160,255,.4), inset 0 0 6px rgba(80,160,255,.1);
      transform: translateY(-3px);
    }
    #delivery-list li.drag-neighbor-below {
      border-color: rgba(100,180,255,.7);
      box-shadow: 0 0 10px rgba(80,160,255,.4), inset 0 0 6px rgba(80,160,255,.1);
      transform: translateY(3px);
    }
    #delivery-list li.dragging { opacity: .15; }
    .delivery-num {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border-radius: 6px;
      min-width: 26px; height: 26px; font-size: .75rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(79,140,255,.35);
      letter-spacing: -.2px;
    }
    .delivery-addr { flex: 1; line-height: 1.3; word-break: break-word; min-width: 0; }
    .delivery-place-name {
      font-size: .75rem; font-weight: 700; color: var(--accent); margin-bottom: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .delivery-note {
      font-size: .68rem; color: var(--yellow); margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-style: italic; cursor: pointer;
    }
    .delivery-note::before { content: '\00AB\00A0'; }
    .delivery-note::after { content: '\00A0\00BB'; }
    .delivery-note-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text); font-size: .7rem; padding: 4px 8px;
      margin-top: 3px; outline: none; font-style: italic;
    }
    .delivery-note-input:focus { border-color: var(--accent); }
    .delivery-leg-info {
      font-size: .62rem; color: var(--text2); margin-top: 3px;
      display: flex; gap: 8px; opacity: .75;
    }
    .drag-handle {
      cursor: grab; color: var(--text2); font-size: .9rem;
      padding: 4px 2px; flex-shrink: 0; user-select: none;
      touch-action: none; display: flex; align-items: center;
      transition: color .15s;
    }
    .drag-handle:hover { color: var(--accent); }
    .drag-handle:active { cursor: grabbing; }
    #delivery-list li.swiping { transition: transform .15s, opacity .15s; }
    #delivery-list li.swipe-out { transform: translateX(-100%); opacity: 0; }
    #delivery-list:empty::after {
      content: 'Aucune adresse ajoutée';
      color: var(--text2); font-size: .8rem; font-style: italic;
      text-align: center; padding: 10px 0; display: block;
    }

    /* ── GHOST (clone visible pendant le drag) ── */
    .drag-ghost {
      position: fixed; z-index: 99999; pointer-events: none;
      background: var(--surface2); border: 1.5px solid var(--accent);
      border-radius: 8px; padding: 8px 12px;
      display: flex; align-items: center; gap: 8px;
      font-size: .8rem; color: var(--text);
      opacity: .88; box-shadow: 0 8px 24px rgba(0,0,0,.5);
      transform: rotate(1.5deg);
      max-width: 340px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .drag-ghost .delivery-num {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border-radius: 5px;
      min-width: 22px; height: 22px; font-size: .65rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    /* ── OPTIMIZE BUTTON ── */
    #btn-optimize {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; width: 100%; padding: 12px; font-size: .9rem;
      border-radius: var(--radius); letter-spacing: .2px;
    }

    /* ── STATUS ── */
    #status-bar {
      border-radius: 8px; padding: 8px 12px; font-size: .78rem; font-weight: 500;
      display: none; align-items: center; gap: 8px;
    }
    #status-bar.visible { display: flex; }
    #status-bar.loading { background: #162040; color: var(--accent); border: 1px solid #2a3a5c; }
    #status-bar.success { background: var(--green-bg); color: var(--green); border: 1px solid #1a4a2a; }
    #status-bar.error { background: var(--red-bg); color: var(--red); border: 1px solid #5c2a2a; }
    .spinner {
      width: 12px; height: 12px; border: 2px solid currentColor;
      border-top-color: transparent; border-radius: 50%;
      animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULTS ── */
    #results-panel { display: none; }
    #results-panel.visible { display: block; }
    .results-title { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text2); margin-bottom: 8px; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
    .summary-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 6px; text-align: center;
    }
    .summary-card span { display: block; font-size: .65rem; color: var(--text2); margin-bottom: 2px; }
    .summary-card strong { font-size: .9rem; color: var(--text); }
    #route-steps { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    #route-steps li {
      display: flex; gap: 10px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; font-size: .78rem; color: var(--text2);
    }
    .step-badge {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
      font-weight: 700; font-size: .72rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(79,140,255,.3); margin-top: 2px;
    }
    .step-badge.depot { background: linear-gradient(135deg, var(--green), #1a9a4a); box-shadow: 0 2px 6px rgba(34,197,94,.3); }
    .step-content { flex: 1; min-width: 0; }
    .step-place-name { font-size: .75rem; font-weight: 700; color: var(--accent); margin-bottom: 1px; }
    .step-addr { line-height: 1.35; word-break: break-word; color: var(--text); font-size: .78rem; }
    .step-meta { font-size: .65rem; color: var(--text2); margin-top: 3px; display: flex; gap: 6px; }
    .step-note {
      font-size: .68rem; color: var(--yellow); font-style: italic; margin-top: 3px;
      text-align: left;
    }
    .step-status {
      font-size: .62rem; font-weight: 700; color: var(--green);
      text-align: right; margin-top: 4px; text-transform: uppercase; letter-spacing: .5px;
    }
    #route-steps li.step-delivered {
      opacity: .5; border-color: var(--green); background: var(--green-bg);
    }
    #route-steps li.step-delivered .step-badge {
      background: var(--green); box-shadow: none;
    }
    #route-steps li.step-current {
      border-color: var(--accent); box-shadow: 0 0 8px rgba(79,140,255,.3);
    }

    /* ── NAVIGATION ── */
    #btn-nav-start {
      display: none; width: 100%; padding: 12px; font-size: .88rem;
      background: linear-gradient(135deg, var(--green), #1a9a4a); color: #fff;
      border-radius: var(--radius); letter-spacing: .2px;
    }
    #btn-nav-start.visible { display: block; }
    #nav-panel { display: none; }
    #nav-panel.visible {
      display: flex; flex-direction: column; gap: 10px;
      background: linear-gradient(135deg, #0d2847, #163a5c);
      border: 1px solid var(--accent); border-radius: var(--radius); padding: 14px;
    }
    .nav-header {
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-header-title { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--accent); }
    .nav-progress-text { font-size: .72rem; color: rgba(255,255,255,.6); }
    .nav-progress-bar {
      height: 4px; background: rgba(255,255,255,.1); border-radius: 2px; overflow: hidden;
    }
    .nav-progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--green), #34d399);
      border-radius: 2px; transition: width .4s ease;
    }
    .nav-current {
      display: flex; align-items: center; gap: 12px;
      background: rgba(0,0,0,.2); border-radius: 8px; padding: 10px 12px;
    }
    .nav-badge {
      background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff;
      min-width: 38px; height: 38px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1.05rem; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(79,140,255,.4);
    }
    .nav-info { flex: 1; min-width: 0; }
    .nav-dest { color: #fff; font-size: .82rem; font-weight: 600; line-height: 1.3; word-break: break-word; }
    .nav-meta { color: rgba(255,255,255,.5); font-size: .72rem; margin-top: 3px; }
    .nav-actions { display: flex; gap: 6px; }
    #btn-nav-go {
      flex: 1; background: var(--green); color: #fff; padding: 10px; font-size: .82rem;
    }
    #btn-nav-next {
      flex: 1; background: var(--accent); color: #fff; padding: 10px; font-size: .82rem;
    }
    #btn-nav-center {
      position: absolute; top: 10px; right: 10px;
      background: var(--surface2); color: var(--text2); border: 1px solid var(--border);
      width: 32px; height: 32px; border-radius: 8px; padding: 0;
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    #btn-nav-center:hover { color: var(--accent); border-color: var(--accent); }
    #btn-nav-exit {
      background: transparent; color: var(--text2); border: 1px solid var(--border);
      padding: 6px 10px; font-size: .72rem; width: 100%;
    }
    .nav-arrived { color: var(--green) !important; font-weight: 600; }

    /* ── MAP PREVIEW ── */
    #map-preview {
      display: none; width: 100%; height: 180px;
      border-radius: var(--radius); overflow: hidden;
      border: 1px solid var(--border); cursor: pointer;
    }
    @media (max-width: 768px) {
      #map-preview { display: block; }
    }

    /* ── RESET ── */
    #btn-reset {
      background: transparent; color: var(--text2); border: 1px solid var(--border);
      width: 100%; padding: 8px; font-size: .78rem; border-radius: 8px;
    }
    #btn-reset:not(:disabled):hover { background: var(--surface2); color: var(--text); }

    /* ── MAP ── */
    #map { flex: 1; height: 100%; }

    /* ── TOGGLE MOBILE ── */
    #mobile-toggle {
      display: none; position: fixed; top: 12px; right: 12px;
      z-index: 20; background: var(--surface); color: var(--text);
      width: 42px; height: 42px; border-radius: 10px;
      border: 1px solid var(--border); box-shadow: 0 2px 10px rgba(0,0,0,.4);
      cursor: pointer; font-size: 1.2rem;
      align-items: center; justify-content: center;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      #sidebar {
        width: 100%; min-width: unset; height: 100vh;
        position: fixed; top: 0; left: 0; z-index: 15;
        transition: transform .3s ease;
      }
      #sidebar.hidden { transform: translateY(100%); pointer-events: none; }
      #sidebar { overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
      #map { width: 100%; height: 100vh; }
      #mobile-toggle { display: flex; }
      .sidebar-header { padding: 14px 16px 10px; }
      .sidebar-body { padding: 10px; }
    }

    /* ── AUTOCOMPLETE ── */
    .pac-container { z-index: 10001 !important; }
    .freq-dropdown {
      display: none; position: absolute; left: 0; right: 0; top: 100%;
      background: var(--surface2); border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 8px 8px; box-shadow: 0 6px 16px rgba(0,0,0,.4);
      z-index: 10002; max-height: 170px; overflow-y: auto;
    }
    .freq-dropdown.visible { display: block; }
    .freq-item {
      padding: 8px 12px; font-size: .8rem; color: var(--text);
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .freq-item:last-child { border-bottom: none; }
    .freq-item:hover { background: var(--bg); }
    .freq-item .freq-icon { color: var(--yellow); font-size: .72rem; flex-shrink: 0; }
    .freq-item .freq-count { color: var(--text2); font-size: .68rem; margin-left: auto; flex-shrink: 0; }
    .input-wrapper { position: relative; flex: 1; display: flex; }
    .input-wrapper input { width: 100%; }
  </style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-header">
    <h1>Nexum</h1>
    <p>Planification intelligente de tournées</p>
  </div>
  <div class="sidebar-body">

    <div id="api-status-bar" style="display:flex;align-items:center;padding:2px 12px;">
      <span class="api-status-dot" id="api-dot"></span>
    </div>

    <div id="app-sections">
      <div class="section">
        <div class="section-title">Point de départ</div>
        <div class="input-wrapper">
          <input type="text" id="start-input" placeholder="Adresse de départ..." autocomplete="off" />
          <div class="freq-dropdown" id="freq-start"></div>
        </div>
        <button class="btn-success" id="btn-set-start" onclick="handleSetStart()" style="width:100%;margin-top:6px;">OK</button>
        <div id="start-display"></div>
      </div>

      <div class="section">
        <div class="section-title">Adresses de livraison <span id="delivery-count"></span></div>
        <ul id="delivery-list"></ul>
        <div class="input-row">
          <div class="input-wrapper">
            <input type="text" id="delivery-input" placeholder="Ajouter une adresse..." autocomplete="off" />
            <div class="freq-dropdown" id="freq-delivery"></div>
          </div>
          <button class="btn-primary" id="btn-add" onclick="handleAddDelivery()">+</button>
        </div>
      </div>

      <button id="btn-optimize" onclick="optimizeRoute()">Optimiser l'itinéraire</button>
      <div id="status-bar"></div>

      <div id="results-panel" class="section">
        <div class="results-title">Itinéraire optimisé</div>
        <div class="summary-grid" id="route-summary"></div>
        <ul id="route-steps"></ul>
      </div>

      <button id="btn-nav-start" onclick="startNavigation()">Commencer la tournée</button>

      <div id="nav-panel">
        <button id="btn-nav-center" onclick="centerOnMe()" title="Recentrer">&#8982;</button>
        <div class="nav-header">
          <span class="nav-header-title">Navigation</span>
          <span class="nav-progress-text" id="nav-progress-text"></span>
        </div>
        <div class="nav-progress-bar"><div class="nav-progress-fill" id="nav-progress-fill"></div></div>
        <div class="nav-current">
          <div class="nav-badge" id="nav-badge"></div>
          <div class="nav-info">
            <div class="nav-dest" id="nav-dest"></div>
            <div class="nav-meta" id="nav-meta"></div>
          </div>
        </div>
        <div class="nav-actions">
          <button id="btn-nav-go" onclick="openInGoogleMaps()">&#x1F4CD; Google Maps</button>
          <button id="btn-nav-next" onclick="nextNavStop()">Suivant</button>
        </div>
        <button id="btn-nav-exit" onclick="exitNavigation()">Quitter la navigation</button>
      </div>

      <div id="map-preview" onclick="toggleSidebar()"></div>
      <button id="btn-reset" onclick="resetAll()">Réinitialiser la tournée</button>
      <button id="btn-reset" style="margin-top:4px;background:var(--red-bg);color:var(--red);border:1px solid #5c2a2a;width:100%;padding:8px;font-size:.72rem;border-radius:8px;cursor:pointer" onclick="if(confirm('Effacer toutes les données (cache, session, préférences) et recharger ?')){caches.keys().then(k=>Promise.all(k.map(c=>caches.delete(c))));localStorage.clear();navigator.serviceWorker.getRegistrations().then(r=>r.forEach(s=>s.unregister()));setTimeout(()=>location.reload(true),500)}">Vider le cache &amp; données</button>
    </div>
  </div>
</div>

<div id="map"></div>
<button id="mobile-toggle" onclick="toggleSidebar()"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"/><path d="M15 5.764v15"/><path d="M9 3.236v15"/></svg></button>

<script>
const state = {
  map: null, geocoder: null, directionsService: null, directionsRenderer: null,
  startPoint: null, deliveries: [], markers: [],

// ── HAVERSINE + TSP ──
function haversine(a, b) {
  const R = 6371000, toR = x => x * Math.PI / 180;
  const dLat = toR(b.lat - a.lat), dLon = toR(b.lng - a.lng);
  const s = Math.sin(dLat/2)**2 + Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}
function buildDistanceMatrix(pts) {
  return pts.map((a, i) => pts.map((b, j) => i === j ? 0 : haversine(a, b)));
}
function nearestNeighborTSP(mx, start = 0) {
  const n = mx.length, vis = new Array(n).fill(false), tour = [start]; vis[start] = true;
  for (let s = 1; s < n; s++) {
    const c = tour[tour.length-1]; let nn = -1, nd = Infinity;
    for (let j = 0; j < n; j++) { if (!vis[j] && mx[c][j] < nd) { nn = j; nd = mx[c][j]; } }
    if (nn === -1) break; vis[nn] = true; tour.push(nn);
  }
  return tour;
}

async function optimizeRoute() {
  if (!state.startPoint) return showStatus('error', 'Définissez un point de départ.');

  if (state.deliveries.length === 1) { displayRoute([state.startPoint, state.deliveries[0]]); return; }
  const all = [state.startPoint, ...state.deliveries];
  const tour = nearestNeighborTSP(buildDistanceMatrix(all), 0);
  state.deliveries = tour.slice(1).map(i => all[i]);
  renderDeliveryList(); displayRoute([state.startPoint, ...state.deliveries]); saveSession();
}

function initDragAndDrop() {
  const ul = document.getElementById('delivery-list');
  const items = ul.querySelectorAll('li');
  items.forEach(li => {
    const handle = li.querySelector('.drag-handle');
    let ghost = null;

    function createGhost(li, x, y) {
      ghost = document.createElement('div'); ghost.className = 'drag-ghost';
      const num = li.querySelector('.delivery-num').textContent;
      const addr = li.querySelector('.delivery-addr').textContent;
      ghost.innerHTML = `<div class="delivery-num">${num}</div><span>${addr}</span>`;
      document.body.appendChild(ghost); moveGhost(x, y);
    }
    function moveGhost(x, y) { if (ghost) { ghost.style.left = (x + 12) + 'px'; ghost.style.top = (y - 16) + 'px'; } }
    function removeGhost() { if (ghost) { ghost.remove(); ghost = null; } }

    function clearHighlights() { items.forEach(el => el.classList.remove('drag-neighbor-above','drag-neighbor-below')); }
    function highlightGap(y) {
      clearHighlights();
      const gap = getInsertGap(ul, y, li);
      if (gap.above) gap.above.classList.add('drag-neighbor-above');
      if (gap.below) gap.below.classList.add('drag-neighbor-below');
    }

    // MOUSE
    handle.addEventListener('mousedown', e => {
      e.preventDefault();
      const dragIdx = parseInt(li.dataset.idx);
      li.classList.add('dragging'); createGhost(li, e.clientX, e.clientY);
      const onMove = e2 => { moveGhost(e2.clientX, e2.clientY); highlightGap(e2.clientY); };
      const onUp = e2 => {
        document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp);
        li.classList.remove('dragging'); clearHighlights(); removeGhost();
        const gap = getInsertGap(ul, e2.clientY, li);
        if (gap.insertIdx !== dragIdx && gap.insertIdx !== dragIdx + 1) {
          const to = gap.insertIdx > dragIdx ? gap.insertIdx - 1 : gap.insertIdx;
          moveToPosition(dragIdx, to);
        }
      };
      document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp);
    });

    // TOUCH
    handle.addEventListener('touchstart', e => {
      e.preventDefault();
      li._dragIdx = parseInt(li.dataset.idx); li.classList.add('dragging');
      const touch = e.touches[0]; createGhost(li, touch.clientX, touch.clientY);
    }, { passive: false });
    handle.addEventListener('touchmove', e => {
      e.preventDefault(); const touch = e.touches[0]; moveGhost(touch.clientX, touch.clientY);
      highlightGap(touch.clientY);
    }, { passive: false });
    handle.addEventListener('touchend', e => {
      const dragIdx = li._dragIdx;
      li.classList.remove('dragging'); clearHighlights(); removeGhost();
      const touch = e.changedTouches[0];
      const gap = getInsertGap(ul, touch.clientY, li);
      if (gap.insertIdx !== dragIdx && gap.insertIdx !== dragIdx + 1) {
        const to = gap.insertIdx > dragIdx ? gap.insertIdx - 1 : gap.insertIdx;
        moveToPosition(dragIdx, to);
      }
    });
  });
}
function getInsertGap(ul, y, dragLi) {
  const items = [...ul.querySelectorAll('li')].filter(el => el !== dragLi);
  if (!items.length) return { above: null, below: null, insertIdx: 0 };
  // Find which gap the cursor falls into
  for (let i = 0; i < items.length; i++) {
    const r = items[i].getBoundingClientRect();
    if (y < r.top + r.height / 2) {
      return { above: i > 0 ? items[i - 1] : null, below: items[i], insertIdx: parseInt(items[i].dataset.idx) };
    }
  }
  const last = items[items.length - 1];
  return { above: last, below: null, insertIdx: parseInt(last.dataset.idx) + 1 };
}

  items.forEach(li => {
    let startX = 0, dx = 0, swiping = false;
    li.addEventListener('touchstart', e => {
      if (e.target.closest('.drag-handle') || e.target.closest('.delivery-note-input')) return;
      startX = e.touches[0].clientX; dx = 0; swiping = true;
    }, { passive: true });
    li.addEventListener('touchmove', e => {
      if (!swiping) return;
      dx = e.touches[0].clientX - startX;
      if (dx > 0) dx = 0; // only swipe left
      if (dx < -30) li.style.transform = `translateX(${dx}px)`;
    }, { passive: true });
    li.addEventListener('touchend', () => {
      if (!swiping) return; swiping = false;
      if (dx < -100) {
        li.classList.add('swiping', 'swipe-out');
        const id = parseInt(li.dataset.id);
        setTimeout(() => removeDelivery(id), 200);
      } else {
        li.style.transform = ''; li.classList.add('swiping');
        setTimeout(() => li.classList.remove('swiping'), 150);
      }
    });
  });
}

// ── DISPLAY ROUTE ──
function displayRoute(stops) {
  setUIBusy(true); showStatus('loading', 'Tracé...');
  const origin = { lat: stops[0].lat, lng: stops[0].lng };
  const dest = { lat: stops[stops.length-1].lat, lng: stops[stops.length-1].lng };
  const wps = stops.slice(1, -1).map(s => ({ location: { lat: s.lat, lng: s.lng }, stopover: true }));
  state.directionsService.route({
    origin, destination: dest, waypoints: wps, optimizeWaypoints: false,
    travelMode: google.maps.TravelMode.DRIVING, unitSystem: google.maps.UnitSystem.METRIC, language: 'fr',
  }, (result, status) => {
    if (status !== 'OK') { showStatus('error', 'Erreur itinéraire : ' + status); setUIBusy(false); return; }
    clearMarkers();
    if (state.startPoint?.marker) { state.startPoint.marker.setMap(null); state.startPoint.marker = null; }
    state.deliveries.forEach(d => { if (d.marker) { d.marker.setMap(null); d.marker = null; } });
    state.directionsRenderer.setDirections(result);
    if (state.previewRenderer) state.previewRenderer.setDirections(result);
    stops.forEach((s, r) => {
      const lbl = r === 0 ? 'D' : String(r), col = r === 0 ? '#22c55e' : '#4f8cff', ttl = r === 0 ? 'Départ' : `Livraison ${r}`;
      const pos = { lat: s.lat, lng: s.lng };
      state.markers.push(createClassicMarker(pos, lbl, col, ttl));
      if (state.previewMap) state.previewMarkers.push(createClassicMarker(pos, lbl, col, ttl, state.previewMap, 0.65));
    });
    const legs = result.routes[0].legs; let td = 0, tt = 0;
    legs.forEach(l => { td += l.distance.value; tt += l.duration.value; });
    state.navStops = stops; state.navLegs = legs;
    state.deliveries.forEach((d, i) => {
      if (legs[i]) { d.legDist = legs[i].distance.text; d.legDur = legs[i].duration.text; }
    });
    showResults(stops, legs, td, tt); showStatus('success', `${state.deliveries.length} livraison(s) optimisée(s).`);
    renderDeliveryList();
    document.getElementById('btn-nav-start').classList.add('visible');
    document.getElementById('nav-panel').classList.remove('visible');
    saveSession(); setUIBusy(false);
  });
}

// ── RESULTS ──
function showResults(stops, legs, distM, durS) {
  const km = (distM/1000).toFixed(1), h = Math.floor(durS/3600), m = Math.floor((durS%3600)/60);
  document.getElementById('route-summary').innerHTML = `
    <div class="summary-card"><span>Distance</span><strong>${km} km</strong></div>
    <div class="summary-card"><span>Durée</span><strong>${h > 0 ? h+'h '+m+'min' : m+' min'}</strong></div>
    <div class="summary-card"><span>Arrêts</span><strong>${state.deliveries.length}</strong></div>`;
  renderRouteSteps();
  document.getElementById('results-panel').classList.add('visible');
}
function renderRouteSteps() {
  if (!state.navStops || !state.navLegs) return;
  const stops = state.navStops, legs = state.navLegs;
  const navActive = document.getElementById('nav-panel').classList.contains('visible');
  const now = new Date();
  let cumSeconds = 0;
  let html = `<li><div class="step-badge depot">D</div><div class="step-content">
    <div class="step-place-name" style="color:var(--green)">Départ</div>
    <div class="step-addr">${stops[0].formatted}</div>
  </div></li>`;
  for (let i = 0; i < legs.length; i++) {
    cumSeconds += legs[i].duration.value;
    const eta = new Date(now.getTime() + cumSeconds * 1000);
    const etaStr = eta.getHours() + 'h' + String(eta.getMinutes()).padStart(2, '0');
    const d = state.deliveries[i];
    const pn = d && d.placeName ? `<div class="step-place-name">${d.placeName}</div>` : '';
    const note = d && d.note ? `<div class="step-note">— ${d.note}</div>` : '';
    const stepClass = navActive && i < state.navIndex ? 'step-delivered' : navActive && i === state.navIndex ? 'step-current' : '';
    const delivered = navActive && i < state.navIndex ? '<div class="step-status">Livré ✓</div>' : '';
    html += `<li class="${stepClass}"><div class="step-badge">${i+1}</div><div class="step-content">
      ${pn}<div class="step-addr">${stops[i+1].formatted}</div>
      <div class="step-meta"><span>${legs[i].distance.text}</span><span>·</span><span>${legs[i].duration.text}</span><span>·</span><span>~${etaStr}</span></div>
      ${note}${delivered}
    </div></li>`;
  }
  document.getElementById('route-steps').innerHTML = html;
}

// ── STATUS / RESET / PREFS ──
function showStatus(type, msg) {
  const b = document.getElementById('status-bar'); b.className = `visible ${type}`;
  b.innerHTML = `${type==='loading'?'<div class="spinner"></div>':type==='success'?'&#10003;':'!'} ${msg}`;
}
// ── NAVIGATION GPS ──
function startNavigation() {
  if (!state.navStops || !state.navLegs) return;
  if (!navigator.geolocation) { showStatus('error', 'G\u00e9olocalisation non disponible sur ce navigateur.'); return; }
  state.navIndex = 0; state.followMode = true;
  document.getElementById('btn-nav-start').classList.remove('visible');
  document.getElementById('nav-panel').classList.add('visible');
  updateNavPanel(); renderDeliveryList(); renderRouteSteps(); saveSession();
  openInGoogleMaps();
  // Wake Lock — écran toujours allumé
  if ('wakeLock' in navigator) navigator.wakeLock.request('screen').then(l => state.wakeLock = l).catch(() => {});
  state.watchId = navigator.geolocation.watchPosition(
    pos => updateGPSPosition(pos.coords),
    err => {
      const msgs = { 1: 'G\u00e9olocalisation refus\u00e9e.', 2: 'Position indisponible.', 3: 'D\u00e9lai d\u00e9pass\u00e9.' };
      showStatus('error', msgs[err.code] || 'Erreur GPS.');
    },
    { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
  );
}
function updateGPSPosition(coords) {
  const pos = { lat: coords.latitude, lng: coords.longitude };
  const dotSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
    <circle cx="14" cy="14" r="13" fill="rgba(66,133,244,.15)"/>
    <circle cx="14" cy="14" r="7" fill="#4285F4" stroke="#fff" stroke-width="2.5"/></svg>`;
  if (!state.posMarker) {
    state.posMarker = new google.maps.Marker({ position: pos, map: state.map, zIndex: 2000,
      icon: { url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(dotSvg),
        scaledSize: new google.maps.Size(28, 28), anchor: new google.maps.Point(14, 14) } });
    state.posCircle = new google.maps.Circle({ map: state.map, center: pos,
      radius: Math.min(coords.accuracy || 50, 500),
      fillColor: '#4285F4', fillOpacity: 0.08, strokeColor: '#4285F4', strokeOpacity: 0.25, strokeWeight: 1, clickable: false });
  } else {
    state.posMarker.setPosition(pos);
    state.posCircle.setCenter(pos);
    state.posCircle.setRadius(Math.min(coords.accuracy || 50, 500));
  }
  if (state.followMode) { state.map.panTo(pos); state.map.setZoom(Math.max(state.map.getZoom(), 16)); }
  // Update distance to current destination
  if (state.navStops && state.navIndex < state.deliveries.length) {
    const dest = state.navStops[state.navIndex + 1];
    const dist = haversine(pos, dest);
    const meta = document.getElementById('nav-meta');
    if (dist < 80) {
      meta.textContent = 'Vous \u00eates arriv\u00e9 !';
      meta.classList.add('nav-arrived');
    } else {
      meta.textContent = dist < 1000 ? Math.round(dist) + ' m restant' : (dist / 1000).toFixed(1) + ' km restant';
      meta.classList.remove('nav-arrived');
    }
  }
}
function updateNavPanel() {
  const i = state.navIndex, total = state.deliveries.length;
  const stop = state.navStops[i + 1], leg = state.navLegs[i];
  document.getElementById('nav-badge').textContent = i + 1;
  document.getElementById('nav-dest').textContent = stop.formatted;
  document.getElementById('nav-meta').textContent = leg.distance.text + ' \u00b7 ' + leg.duration.text;
  document.getElementById('nav-meta').classList.remove('nav-arrived');
  document.getElementById('nav-progress-text').textContent = (i + 1) + ' / ' + total;
  document.getElementById('nav-progress-fill').style.width = ((i + 1) / total * 100) + '%';
  document.getElementById('btn-nav-next').textContent = i < total - 1 ? 'Suivant \u25b8' : 'Termin\u00e9 \u2713';
  // Bounce destination marker
  state.markers.forEach((m, idx) => m.setAnimation(idx === i + 1 ? google.maps.Animation.BOUNCE : null));
  setTimeout(() => state.markers.forEach(m => m.setAnimation(null)), 1500);
}
function nextNavStop() {
  if (state.navIndex >= state.deliveries.length - 1) {
    state.navIndex = state.deliveries.length;
    exitNavigation(); renderRouteSteps(); showStatus('success', 'Tournée terminée ! Vérifiez vos livraisons puis réinitialisez.');
    saveSession(); return;
  }
  state.navIndex++; state.followMode = true; updateNavPanel(); renderDeliveryList(); renderRouteSteps(); saveSession();
  openInGoogleMaps();
}
function openInGoogleMaps() {
  if (!state.navStops || state.navIndex + 1 >= state.navStops.length) return;
  const dest = state.navStops[state.navIndex + 1];
  const coords = `${dest.lat},${dest.lng}`;
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isAndroid = /Android/i.test(navigator.userAgent);
  if (isAndroid) {
    window.open(`google.navigation:q=${coords}&mode=d`, '_self');
  } else if (isIOS) {
    window.open(`comgooglemaps://?daddr=${coords}&directionsmode=driving`, '_self');
  } else {
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${coords}&travelmode=driving`, '_blank');
  }
}
function centerOnMe() {
  state.followMode = true;
  if (state.posMarker) { state.map.panTo(state.posMarker.getPosition()); state.map.setZoom(Math.max(state.map.getZoom(), 16)); }
}
function exitNavigation() {
  clearTimeout(state._recenterTimer);
  if (state.wakeLock) { state.wakeLock.release(); state.wakeLock = null; }
  if (state.watchId !== null) { navigator.geolocation.clearWatch(state.watchId); state.watchId = null; }
  if (state.posMarker) { state.posMarker.setMap(null); state.posMarker = null; }
  if (state.posCircle) { state.posCircle.setMap(null); state.posCircle = null; }
  document.getElementById('nav-panel').classList.remove('visible');
  document.getElementById('btn-nav-start').classList.add('visible');
  state.markers.forEach(m => m.setAnimation(null));
  saveSession();
}

function resetAll() {
  if (!confirm('Réinitialiser la tournée ? Toutes les adresses et le tracé seront effacés.')) return;
  clearMarkers(); state.directionsRenderer.setDirections({ routes: [] });
  if (state.previewRenderer) state.previewRenderer.setDirections({ routes: [] });
  if (state.startPoint?.marker) { state.startPoint.marker.setMap(null); }
  state.startPoint = null;
  state.deliveries.forEach(d => { if (d.marker) d.marker.setMap(null); });
  state.deliveries = [];
  if (state.watchId !== null) { navigator.geolocation.clearWatch(state.watchId); state.watchId = null; }
  if (state.posMarker) { state.posMarker.setMap(null); state.posMarker = null; }
  if (state.posCircle) { state.posCircle.setMap(null); state.posCircle = null; }
  state.navStops = null; state.navLegs = null; state.navIndex = 0;
  document.getElementById('delivery-list').innerHTML = '';
  document.getElementById('delivery-count').textContent = '';
  const sd = document.getElementById('start-display'); if (sd) { sd.textContent = ''; sd.classList.remove('visible'); }
  document.getElementById('results-panel').classList.remove('visible');
  document.getElementById('nav-panel').classList.remove('visible');
  document.getElementById('btn-nav-start').classList.remove('visible');
  document.getElementById('status-bar').className = '';
  localStorage.removeItem('nexum_session');
}
function saveMapPrefs() {
  localStorage.setItem('nexum_mapPrefs', JSON.stringify({
    mapTypeId: state.map.getMapTypeId(), zoom: state.map.getZoom(),
    center: { lat: state.map.getCenter().lat(), lng: state.map.getCenter().lng() },
    tilt: state.map.getTilt(), heading: state.map.getHeading(),
  }));
}
function restoreMapPrefs() {
  try { const p = JSON.parse(localStorage.getItem('nexum_mapPrefs'));
    if (p && p.center) {
      if (p.mapTypeId) state.map.setMapTypeId(p.mapTypeId); if (p.zoom) state.map.setZoom(p.zoom);
      state.map.setCenter(p.center); if (p.tilt != null) state.map.setTilt(p.tilt);
      if (p.heading != null) state.map.setHeading(p.heading);
      return;
    }
  } catch {}
  // No saved prefs — center on user's current position
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      state.map.setCenter({ lat: pos.coords.latitude, lng: pos.coords.longitude });
      state.map.setZoom(13);
    }, () => {}, { enableHighAccuracy: false, timeout: 5000 });
  }
}
function setUIBusy(b) { ['btn-set-start','btn-add','btn-optimize','btn-reset','btn-nav-start'].forEach(id => { const e = document.getElementById(id); if (e) e.disabled = b; }); }
// ── MOBILE TOGGLE ──
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('mobile-toggle');
  sb.classList.toggle('hidden');
  btn.innerHTML = sb.classList.contains('hidden')
    ? '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>'
    : '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"/><path d="M15 5.764v15"/><path d="M9 3.236v15"/></svg>';
}
// Start mobile with sidebar hidden (show map first)
// Sur mobile, la sidebar est visible par défaut

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
